on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

jobs:
  ci:
    # only run on merge to main or if the PR title does not contain '[skip ci]'
    # this allows me to upload the coverage report to codecov on merge
    # also helps with the ci pass badges
    if: github.event_name != 'pull_request' || !contains(github.event.pull_request.title, '[skip ci]')
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Start MinIO
        run: |
          docker run -d --rm --name minio \
            -p 9000:9000 \
            -e MINIO_ROOT_USER=minio_test \
            -e MINIO_ROOT_PASSWORD=minio_test \
            minio/minio:latest server /data

      - name: Wait for MinIO
        run: |
          for i in {1..30}; do
            curl -f http://localhost:9000/minio/health/live && exit 0
            sleep 2
          done
          docker logs minio
          exit 1

      - uses: actions/checkout@v6

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        env:
          PIP_DEFAULT_TIMEOUT: "60"
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install -e .[dev]

      - name: Run tests
        env:
          OPENAQ_API_KEY: ${{ secrets.OPENAQ_API_KEY }}
        run: |
          pytest --cov=src --cov-branch --cov-report=xml

      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          slug: boolYikes/city-pulse
