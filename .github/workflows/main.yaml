on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

jobs:
  ci:
    # only run on pull requests and skip if pr title contains [skip ci]
    if: github.event_name == 'pull_request' && !contains(github.event.pull_request.title, '[skip ci]')
    runs-on: ubuntu-latest

    steps:
      - name: Start MinIO
        run: |
          docker un -d --name minio \
            -p 9000:9000 \
            -e MINIO_ROOT_USER=minio_test \
            -e MINIO_ROOT_PASSWORD=minio_test \
            minio/minio:latest server /data

      - name: Wait for MinIO
        run: |
          for i in {1..30}; do
            curl -f http://localhost:9000/minio/health/live && exit 0
            sleep 2
          done
          docker logs minio
          exit 1

      - uses: actions/checkout@v6

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]

      - name: Run tests
        env:
          OPENAQ_API_KEY: ${{ secrets.OPENAQ_API_KEY }}
        run: |
          pytest --cov=src --cov-branch --cov-report=xml

      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          slug: boolYikes/city-pulse
